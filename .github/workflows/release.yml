name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore SharpIB.slnx

    - name: Publish App (self-contained)
      run: |
        dotnet publish SharpIB.UI/SharpIB.UI.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -o ./release/desktop

    - name: Compile Inno Setup Installer
      run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "inno.iss"'

    - name: Create ZIP
      run: Compress-Archive -Path ./release/desktop/* -DestinationPath ./SharpIB-${{ github.ref_name }}-win-x64.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: SharpIB ${{ github.ref_name }}
        body: |
          ## SharpIB ${{ github.ref_name }}

          ### Download
          Download the ZIP, extract, and run `SharpIB.UI.exe`.

          ### Requirements
          - Windows 10 or later (x64)
          - No .NET installation required (self-contained)

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
        files: |
          SharpIB-${{ github.ref_name }}-win-x64.zip
          release/SharpIB-Setup-win-x64.exe
        generate_release_notes: true

