name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Pulse.slnx

    - name: Publish App (self-contained)
      run: |
        dotnet publish Pulse.UI/Pulse.UI.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./publish

    - name: Create ZIP
      run: Compress-Archive -Path ./publish/* -DestinationPath ./Pulse-${{ github.ref_name }}-win-x64.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Pulse ${{ github.ref_name }}
        body: |
          ## Pulse ${{ github.ref_name }}

          ### Download
          Download the ZIP, extract, and run `Pulse.UI.exe`.

          ### Requirements
          - Windows 10 or later (x64)
          - No .NET installation required (self-contained)

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
        files: Pulse-${{ github.ref_name }}-win-x64.zip
        generate_release_notes: true

